<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Collab — Keanucheese</title>
  <style>
    :root {
      --bg: #05060f;
      --surface: rgba(12, 16, 32, 0.74);
      --surface-strong: rgba(9, 12, 24, 0.9);
      --text: #eef1ff;
      --muted: #b7c1ff;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #67e8f9;
      --accent-2: #a78bfa;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #1b2250 0%, #0a0f23 38%, var(--bg) 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -8vh -8vw;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      filter: saturate(1.25) contrast(1.05);
      z-index: -2;
      opacity: 0.22;
      transform: scale(1.04);
    }

    body::before {
      background-image:
        linear-gradient(135deg, rgba(6, 10, 24, 0.86), rgba(8, 12, 28, 0.62)),
        url("kean_wallride.gif");
      mix-blend-mode: lighten;
      animation: floatA 22s ease-in-out infinite alternate;
    }

    body::after {
      background-image:
        linear-gradient(135deg, rgba(22, 10, 45, 0.65), rgba(0, 0, 0, 0.2)),
        url("kean_5050drop.gif");
      mix-blend-mode: screen;
      opacity: 0.2;
      animation: floatB 26s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes floatA {
      from { transform: scale(1.06) translateY(-1.5%); }
      to { transform: scale(1.12) translateY(1.5%); }
    }

    @keyframes floatB {
      from { transform: scale(1.04) translateX(-1.5%); }
      to { transform: scale(1.1) translateX(1.5%); }
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.08) 0.5px, transparent 0.5px);
      background-size: 3px 3px;
      opacity: 0.2;
      z-index: -1;
    }

    .shell {
      width: min(1020px, 92vw);
      margin: 5vh auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .topbar {
      padding: 14px 18px;
      background: linear-gradient(90deg, rgba(103, 232, 249, 0.18), rgba(167, 139, 250, 0.16));
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .dots {
      display: flex;
      gap: 7px;
    }

    .dots span {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
    }

    .title {
      margin: 0;
      font-size: clamp(0.9rem, 1.4vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    .content {
      padding: clamp(1.2rem, 2.8vw, 2rem);
      display: grid;
      gap: 16px;
    }

    .lang-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    label { font-weight: 600; color: var(--muted); }

    select {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--surface-strong);
      color: var(--text);
    }

    .ticker {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }

    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: run 16s linear infinite;
    }

    @keyframes run {
      to { transform: translateX(-100%); }
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.01em;
    }

    .intro {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.6;
      color: #dce4ff;
    }

    .invite {
      margin-top: 10px;
      font-weight: 700;
      color: var(--accent);
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.1rem;
      color: var(--accent-2);
    }

    ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    a {
      color: #93f3ff;
      text-underline-offset: 3px;
    }

    .footer {
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .shell { margin: 2.5vh auto; }
      body::before, body::after { opacity: 0.16; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <main class="shell">
    <header class="topbar">
      <h2 class="title">SITE_COLLAB — Timesheets Magazine London Interactive</h2>
      <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </header>

    <section class="content">
      <div class="lang-row">
        <label for="lang">Idioma / Language / Idioma:</label>
        <select id="lang">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="pt">Português</option>
        </select>
      </div>

      <div class="ticker"><span id="ticker"></span></div>

      <h1 id="hello"></h1>
      <p class="intro">
        <span id="bio"></span>
        <span class="invite" id="invite"></span>
      </p>

      <div class="grid">
        <article class="card">
          <h2 id="servicesTitle"></h2>
          <ul id="servicesList"></ul>
        </article>

        <article class="card">
          <h2 id="collabsTitle"></h2>
          <ul>
            <li><a href="https://www.etsy.com/shop/LootApparelBoutique" target="_blank" rel="noopener noreferrer">Loot Apparel Boutique</a> — <span id="c1"></span></li>
            <li><a href="https://amazonicwav.tumblr.com/" target="_blank" rel="noopener noreferrer">AmazoNic Wav</a> — <span id="c2"></span></li>
            <li><a href="https://nexusgenesis.odooconsultores.cl/recepcion" target="_blank" rel="noopener noreferrer">Nexus Genesis / Recepción</a> — <span id="c3"></span></li>
            <li><a href="https://nexusgenesis.odooconsultores.cl/tematicas" target="_blank" rel="noopener noreferrer">Nexus Genesis / Temáticas</a> — <span id="c4"></span></li>
            <li>Wizards SK8 — <span id="c5"></span></li>
          </ul>
        </article>
      </div>

      <div class="footer" id="footer"></div>
    </section>
  </main>

  <script>
    const i18n = {
      es: {
        ticker: 'COLLAB STATION :: INNOVACIÓN + WEB3 + ARTE + CULTURA + EVENTOS',
        hello: '¡Hola mundo!',
        bio: 'Soy keanucheese, un polímata moderno — chef, poeta y skater en la vida real.',
        invite: 'Te invito a colaborar en proyectos de innovación, web3, arte, cultura y eventos.',
        servicesTitle: 'Servicios',
        services: ['Webs', 'Servidores de Discord', 'Investigación e innovación', 'Arte & Diseño'],
        collabsTitle: 'Collabs realizadas',
        c1: 'research and design | USA',
        c2: 'experiencia de usuario y video | worldwide',
        c3: 'comunidad IRL | Neo-Medieval',
        c4: 'comunidad IRL/URL e innovación | Solarpunk',
        c5: 'comunidad IRL | Skateboarding',
        footer: '© 199X-20XX Keanucheese Creative Executive Network'
      },
      en: {
        ticker: 'COLLAB STATION :: INNOVATION + WEB3 + ART + CULTURE + EVENTS',
        hello: 'Hello world!',
        bio: 'I am keanucheese, a modern polymath — chef, poet, and skater in real life.',
        invite: 'I invite you to collaborate on projects in innovation, web3, art, culture, and events.',
        servicesTitle: 'Services',
        services: ['Webs', 'Discord servers', 'Research innovation', 'Art & Design'],
        collabsTitle: 'Delivered collabs',
        c1: 'research and design | USA',
        c2: 'user experience and video | worldwide',
        c3: 'IRL community | Neo-Medieval',
        c4: 'IRL/URL community and innovation | Solarpunk',
        c5: 'IRL community | Skateboarding',
        footer: '© 199X-20XX Keanucheese Creative Executive Network'
      },
      pt: {
        ticker: 'COLLAB STATION :: INOVAÇÃO + WEB3 + ARTE + CULTURA + EVENTOS',
        hello: 'Olá mundo!',
        bio: 'Sou keanucheese, um polímata moderno — chef, poeta e skatista na vida real.',
        invite: 'Convido você para colaborar em projetos de inovação, web3, arte, cultura e eventos.',
        servicesTitle: 'Serviços',
        services: ['Webs', 'Servidores de Discord', 'Pesquisa e inovação', 'Arte & Design'],
        collabsTitle: 'Collabs realizadas',
        c1: 'pesquisa e design | USA',
        c2: 'experiência do usuário e vídeo | worldwide',
        c3: 'comunidade IRL | Neo-Medieval',
        c4: 'comunidade IRL/URL e inovação | Solarpunk',
        c5: 'comunidade IRL | Skateboarding',
        footer: '© 199X-20XX Keanucheese Creative Executive Network'
      }
    };

    const fields = ['ticker', 'hello', 'bio', 'invite', 'servicesTitle', 'collabsTitle', 'c1', 'c2', 'c3', 'c4', 'c5', 'footer'];
    const langEl = document.getElementById('lang');

    function render(lang) {
      const t = i18n[lang] || i18n.es;
      fields.forEach((id) => {
        document.getElementById(id).textContent = t[id];
      });

      const servicesList = document.getElementById('servicesList');
      servicesList.innerHTML = '';
      t.services.forEach((service) => {
        const li = document.createElement('li');
        li.textContent = service;
        servicesList.appendChild(li);
      });

      document.documentElement.lang = lang;
    }

    langEl.addEventListener('change', (event) => render(event.target.value));
    render('es');
  </script>
</body>
</html>
